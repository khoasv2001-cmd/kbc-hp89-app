{% extends 'base.html' %}
{% block title %}{% if product %}Sửa{% else %}Thêm{% endif %} sản phẩm – KBC-HP89{% endblock %}
{% block content %}
<h1>🛍️ {% if product %}Sửa sản phẩm{% else %}Thêm sản phẩm{% endif %}</h1>
<form method="post" class="card">
  <div class="form-row full">
    <div><label>Tên sản phẩm *</label>
      <input type="text" name="name" required value="{{ product.name if product else '' }}">
    </div>
  </div>
  <div class="form-row">
    <div><label>ĐVT</label>
      <input type="text" name="unit" value="{{ product.unit if product else '' }}" placeholder="Hộp, Túi, Chai...">
    </div>
    <div><label>Quy cách</label>
      <input type="text" name="packaging" value="{{ product.packaging if product else '' }}" placeholder="500g, 1L...">
    </div>
  </div>
  <div class="form-row">
    <div><label>Giá mặc định (VND)</label>
      <input type="number" step="0.01" name="default_price" value="{{ product.default_price if product else 0 }}">
    </div>
    {% if product %}
    <div><label>Trạng thái</label>
      <select name="active">
        <option value="1" {% if product.active %}selected{% endif %}>Đang dùng</option>
        <option value="" {% if not product.active %}selected{% endif %}>Ngưng</option>
      </select>
    </div>
    {% endif %}
  </div>
  <div style="display:flex; gap:8px; margin-top:14px">
    <button class="btn btn-primary">💾 Lưu</button>
    <a class="btn btn-secondary" href="{{ url_for('products_list') }}">Quay lại</a>
  </div>
</form>
{% endblock %}
