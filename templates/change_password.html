{% extends 'base.html' %}
{% block title %}Đổi mật khẩu – KBC-HP89{% endblock %}
{% block content %}
<h1>🔑 Đổi mật khẩu</h1>
<form method="post" class="card" style="max-width:480px">
  <div class="form-row full">
    <div><label>Mật khẩu hiện tại</label>
      <input type="password" name="old_password" required>
    </div>
  </div>
  <div class="form-row full">
    <div><label>Mật khẩu mới (≥ 6 ký tự)</label>
      <input type="password" name="new_password" required minlength="6">
    </div>
  </div>
  <div class="form-row full">
    <div><label>Xác nhận mật khẩu mới</label>
      <input type="password" name="confirm" required minlength="6">
    </div>
  </div>
  <div style="display:flex; gap:8px; margin-top:14px">
    <button class="btn btn-primary">💾 Đổi mật khẩu</button>
    <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Quay lại</a>
  </div>
</form>
{% endblock %}
