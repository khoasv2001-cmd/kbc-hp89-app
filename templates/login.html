<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập – KBC-HP89</title>
  <link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}">
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #c61c2d 0%, #7a0d18 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .login-box {
      background: #fff; padding: 32px 32px 28px; border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.3); width: 360px; max-width: 92vw;
    }
    .logo-wrap {
      text-align: center; margin-bottom: 18px;
    }
    .logo-wrap img {
      width: 280px; height: 280px; object-fit: contain;
      display: inline-block;
      filter: drop-shadow(0 4px 10px rgba(198,28,45,.35)) drop-shadow(0 1px 3px rgba(0,0,0,.2));
    }
    h1 {
      text-align: center; color: #c61c2d; font-size: 22px; margin: 8px 0 4px;
      letter-spacing: .5px;
    }
    .sub {
      text-align: center; color: #6b4f1a; font-size: 13px; margin-bottom: 22px;
    }
    label {
      display: block; font-weight: 600; font-size: 13px;
      color: #3a1f1f; margin: 12px 0 5px;
    }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 12px; border: 1px solid #d0d7de;
      border-radius: 6px; font-size: 14px; box-sizing: border-box;
    }
    input:focus {
      outline: none; border-color: #c61c2d;
      box-shadow: 0 0 0 2px rgba(198,28,45,.15);
    }
    button {
      width: 100%; padding: 11px; margin-top: 18px;
      background: #c61c2d; color: #fff; border: 0; border-radius: 6px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #9b1422; }
    .flash {
      padding: 10px; margin-bottom: 12px; border-radius: 6px; font-size: 13px;
    }
    .flash.danger { background: #f8d7da; color: #721c24; border: 1px solid #dc3545; }
    .footer-note {
      text-align: center; margin-top: 16px; font-size: 11px; color: #999;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='kbc-logo.png') }}" alt="KBC">
    </div>
    <h1>KBC – HP89</h1>
    <div class="sub">Hệ thống quản lý liên kết</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <label>Tên đăng nhập</label>
      <input type="text" name="username" autofocus required>
      <label>Mật khẩu</label>
      <input type="password" name="password" required>
      <button type="submit">Đăng nhập</button>
    </form>
    <div class="footer-note">© KBC-HP89 · Liên hệ admin nếu quên mật khẩu</div>
  </div>
</body>
</html>
